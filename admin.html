<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>單字管理</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>單字管理</h1>
      <a class="btn" href="index.html">回到練習</a>
    </header>

    <section class="admin">
      <form id="word-form">
        <label>英文單字 <input id="word" required /></label>
        <label>翻譯 <input id="translation-input" /></label>
        <label>詞性 <input id="pos-input" /></label>
        <label>例句 <input id="example-input" /></label>
        <label>字根分析 <input id="roots-input" /></label>

        <div class="form-actions">
          <button type="button" id="autofill">自動填入</button>
          <button type="submit" id="save">新增/更新</button>
        </div>
      </form>

      <section id="list-area">
        <h2>已儲存單字</h2>
        <ul id="word-list"></ul>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
