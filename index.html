<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>背單字卡片</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>背單字練習</h1>
      <a class="btn" href="admin.html">管理單字</a>
    </header>

    <section class="card-area">
      <div id="flashcard" class="card" tabindex="0">
        <div class="face front" id="card-front">英文</div>
        <div class="face back" id="card-back">
          <div class="back-field"><strong>翻譯：</strong><span id="translation"></span></div>
          <div class="back-field"><strong>詞性：</strong><span id="pos"></span></div>
          <div class="back-field"><strong>例句：</strong><span id="example"></span></div>
          <div class="back-field"><strong>字根分析：</strong><span id="roots"></span></div>
        </div>
      </div>
    </section>

    <nav class="controls">
      <button id="prev">上一個</button>
      <button id="next">下一個</button>
      <span id="idx"></span>
    </nav>
  </main>

  <script src="app.js"></script>
</body>
</html>
